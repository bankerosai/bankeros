{{/* Placeholder Secret — production should use sealed-secrets or external-secrets */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bankeros.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: "CHANGE_ME_IN_PRODUCTION_USE_SEALED_SECRETS"
  database-url: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  redis-url: "redis://:{{ .Values.redis.auth.password }}@{{ .Release.Name }}-redis-master:6379"
  encryption-key: "CHANGE_ME_TO_32_BYTE_HEX_KEY"
