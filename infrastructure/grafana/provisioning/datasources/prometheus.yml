# Auto-provisioned Prometheus datasource for Grafana.
# Mount this directory at /etc/grafana/provisioning/datasources/ in the Grafana container.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'
