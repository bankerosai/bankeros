<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="BankerOS Admin — Open Source Digital Banking Platform" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>BankerOS — Digital Banking Platform</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Self-heal: BankerOS does not register any Service Worker. If a previous
      app served on this port (悟空 CRM, an old PWA, etc.) left one behind,
      it would intercept every fetch and serve its cached HTML. Unregister
      anything we find and wipe caches on first paint.
    -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          if (!regs.length) return;
          console.warn('[bankeros] removing', regs.length, 'leftover service worker(s)');
          Promise.all(regs.map((r) => r.unregister())).then(() => {
            if ('caches' in window) {
              caches.keys().then((keys) => Promise.all(keys.map((k) => caches.delete(k))))
                .finally(() => location.reload());
            } else {
              location.reload();
            }
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
